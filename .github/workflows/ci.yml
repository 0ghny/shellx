name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "shellx.sh"
      - "shellx.fish"
      - "lib/**"
      - "plugins/**"
      - "tests/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: pollenjp/setup-shellcheck@v1
        with:
          version: latest
          # version: 0.10.0
      # - name: Install ShellCheck if missing
      #   run: |
      #     command -v shellcheck >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y shellcheck)
      - name: Run ShellCheck
        run: |
          bash ./hack/dev.sh lint
        continue-on-error: true

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: mfinelli/setup-shfmt@v4
        with:
          shfmt-version: 3.3.1

      - name: Run Shfmt
        run: |
          bash ./hack/dev.sh fmt
        continue-on-error: true

  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version has to be changed
        id: version-check
        shell: bash
        run: |
          git diff-index --name-only --diff-filter=d origin/main | grep -q -i "^lib\/" && echo "lib folder has changes"
          git diff-index --name-only --diff-filter=d origin/main | grep -q "^plugins\/" && echo "plugins folder has changes"
          git diff-index --name-only --diff-filter=d origin/main | grep -q "^shellx.sh" && echo "shellx.sh has changes"

          if git diff-index --name-only --diff-filter=d origin/main | grep -q -i "^lib\/" || \
            git diff-index --name-only --diff-filter=d origin/main | grep -q "^plugins\/" || \
            git diff-index --name-only --diff-filter=d origin/main | grep -q "^shellx.sh"; then
            echo "version has to change"
            if git diff-index --name-only --diff-filter=d origin/main | grep -q "version.txt"; then
              echo "version.txt file has been modified"
            else
              echo "ERROR: version.txt file has not been modified, probably you should update it"
              exit 1
            fi
          fi

      - id: get-version
        run: echo "::set-output name=version::$(cat version.txt)"

      - id: semver
        uses: matt-usurp/validate-semver@v1
        with:
          version: ${{ steps.get-version.outputs.version }}
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Unit Tests
        run: |
          bash hack/dev.sh test-unit
        env:
          SHELLX_TEST_COVERAGE: "true"  # Enable coverage for this step
      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()    # run this step even if previous step failed
        with:
          name: Unit Tests Report     # Name of the check run which will be created
          path: target/**/*.xml         # Path to test results
          reporter: java-junit        # Format of test results
      - name: Archive html report
        if: success() || failure()    # run this step even if previous step failed
        uses: actions/upload-artifact@v7
        with:
          name: unit-tests-html-report
          path: target/**/*.html

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Integration Tests
        run: |
          bash hack/dev.sh test-integration
        env:
          SHELLX_TEST_COVERAGE: "true"  # Enable coverage for this step

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()    # run this step even if previous step failed
        with:
          name: Integration Tests Report     # Name of the check run which will be created
          path: target/**/*.xml         # Path to test results
          reporter: java-junit        # Format of test results

      - name: Archive html report
        if: success() || failure()    # run this step even if previous step failed
        uses: actions/upload-artifact@v7
        with:
          name: integration-tests-html-report
          path: target/**/*.html

  e2e-bash:
    # Tests Bash support on Ubuntu (pre-installed Bash 5.x) and macOS (Bash 4+ via Homebrew,
    # since the system Bash on macOS is 3.x which is below the minimum supported version).
    name: "e2e / bash (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bash 4+ (macOS only)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Verify Bash meets minimum version (>= 4.0)
        run: |
          major=$(bash --version | head -1 | grep -oE '[0-9]+' | head -1)
          echo "Detected Bash major version: $major (required: >= 4)"
          [ "$major" -ge 4 ] || { echo "ERROR: Bash $major is below the minimum required version (4)"; exit 1; }

      - name: Bootstrap ShellX
        shell: bash
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_NO_BANNER: "1"
        run: |
          shopt -s expand_aliases
          source shellx.sh

      - name: shellx version
        shell: bash
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_NO_BANNER: "1"
        run: |
          shopt -s expand_aliases
          source shellx.sh
          shellx version

      - name: shellx info
        shell: bash
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_NO_BANNER: "1"
        run: |
          shopt -s expand_aliases
          source shellx.sh
          shellx info

  e2e-zsh:
    # Tests Zsh support on both Linux and macOS runners.
    # Zsh is pre-installed on macOS; installed via apt on Linux.
    name: "e2e / zsh (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zsh (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh

      - name: Verify Zsh meets minimum version (>= 4.0)
        shell: zsh {0}
        run: |
          major=$(zsh --version | grep -oE '[0-9]+' | head -1)
          echo "Detected Zsh major version: $major (required: >= 4)"
          [[ "$major" -ge 4 ]] || { echo "ERROR: Zsh $major is below the minimum required version (4)"; exit 1; }

      - name: Bootstrap ShellX
        shell: zsh {0}
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_NO_BANNER: "1"
        run: source shellx.sh

      - name: shellx version
        shell: zsh {0}
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_NO_BANNER: "1"
        run: |
          source shellx.sh
          shellx version

      - name: shellx info
        shell: zsh {0}
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_NO_BANNER: "1"
        run: |
          source shellx.sh
          shellx info

  e2e-fish:
    # Tests Fish Shell support (>= 3.2) via shellx.fish on Linux and macOS.
    # Linux: installed via apt. macOS: installed via Homebrew.
    name: "e2e / fish (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Fish Shell (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Install Fish Shell (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Verify Fish meets minimum version (>= 3.2)
        run: |
          version=$(fish --version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          echo "Detected Fish version: $version (required: >= 3.2)"
          if [ "$major" -gt 3 ]; then
            echo "OK"
          elif [ "$major" -eq 3 ] && [ "$minor" -ge 2 ]; then
            echo "OK"
          else
            echo "ERROR: Fish $version is below the minimum required version (3.2)"; exit 1
          fi

      - name: Bootstrap ShellX (Fish)
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_FISH_QUIET: "1"
        run: |
          fish -c 'source "$SHELLX_HOME/shellx.fish" && echo "Fish bootstrap: OK"'

      - name: shellx version (Fish)
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_FISH_QUIET: "1"
        run: |
          fish -c 'source "$SHELLX_HOME/shellx.fish" && shellx version'

      - name: shellx info (Fish)
        env:
          SHELLX_HOME: ${{ github.workspace }}
          SHELLX_FISH_QUIET: "1"
        run: |
          fish -c 'source "$SHELLX_HOME/shellx.fish" && shellx info'
