# ShellX CLI Commands Registry (Data File)
# Format: command|function|category|description
# POSIX-compatible format for easy parsing
#
# Session Commands
list|shellx::plugins::loaded|Session Commands|List loaded plugins in current session
status|shellx::session::status|Session Commands|Display current ShellX session information
reload|shellx::cli::reload|Session Commands|Reload plugins and configuration into current session
#
# Plugin Management
plugins|shellx::cli::plugins|Plugin Management|Manage plugins (subcommands: list, installed, install, uninstall, update, export, sync, reload)
#
# Debug Commands
debug|shellx::cli::debug|Debug Commands|Enable or disable debug output
#
# Configuration
config|shellx::cli::config|Configuration|Manage ShellX configuration (subcommands: reload, print, runtime, set, unset)
#
# System Commands
info|shellx::info|System Commands|Display ShellX information
reset|shellx::cli::reset|System Commands|Reset ShellX to default state
self-update|shellx::update|System Commands|Perform a self-update of ShellX
check-update|shellx::update::info|System Commands|Check for updates and show changelog
version|shellx::cli::version|System Commands|Display ShellX version (subcommands: info, notes [N], check)
#
# Help Command (dynamic)
help|shellx::cli::help|System Commands|Display help about ShellX commands
